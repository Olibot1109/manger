<!DOCTYPE html>
<html>
<head>
  <title>Audit Log</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/static/css/audit.css">
</head>
<body class="audit-viewer">
  <div class="audit-auth">
    <a href="/clients">&larr; Back to Client Manager</a>
    | <a href="/audit/logout">Logout</a>
  </div>
  <h1>Audit Log</h1>
  <div class="audit-stats" id="stats">Total: 0 | Showing: 0</div>

    <div class="audit-filter-bar">
    <input type="text" id="search" class="audit-search-input" placeholder="Search performer/action/target/details..." oninput="applyFilters()">
    <select id="actionFilter" onchange="applyFilters()">
      <option value="">All Actions</option>
    </select>
    <label><input type="checkbox" id="showSuccess" checked onchange="applyFilters()"> Success</label>
    <label><input type="checkbox" id="showFailure" checked onchange="applyFilters()"> Failed</label>
    <button id="refreshBtn" class="audit-refresh-btn" onclick="loadAudit()">Refresh</button>
  </div>

  <table id="auditTable">
    <thead>
      <tr>
        <th width="160">Time</th>
        <th width="100">Performer</th>
        <th width="130">Action</th>
        <th width="100">Target</th>
        <th>Details</th>
        <th width="80">IP</th>
        <th width="70">Result</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <script src="/static/js/audit-viewer.js"></script>
</body>
</html>
